<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M256 32 C256 32 416 64 448 80 V240 C448 368 352 448 256 480 C160 448 64 368 64 240 V80 C96 64 256 32 256 32 Z" fill="url(#shieldGrad)" stroke="#1E40AF" stroke-width="6"/>
  <!-- Brick wall pattern -->
  <g fill="url(#wallGrad)" opacity="0.9">
    <!-- Row 1 -->
    <rect x="168" y="140" width="72" height="32" rx="3"/>
    <rect x="252" y="140" width="72" height="32" rx="3"/>
    <!-- Row 2 (offset) -->
    <rect x="132" y="180" width="72" height="32" rx="3"/>
    <rect x="216" y="180" width="72" height="32" rx="3"/>
    <rect x="300" y="180" width="72" height="32" rx="3"/>
    <!-- Row 3 -->
    <rect x="168" y="220" width="72" height="32" rx="3"/>
    <rect x="252" y="220" width="72" height="32" rx="3"/>
    <!-- Row 4 (offset) -->
    <rect x="132" y="260" width="72" height="32" rx="3"/>
    <rect x="216" y="260" width="72" height="32" rx="3"/>
    <rect x="300" y="260" width="72" height="32" rx="3"/>
    <!-- Row 5 -->
    <rect x="180" y="300" width="60" height="28" rx="3"/>
    <rect x="252" y="300" width="60" height="28" rx="3"/>
  </g>
  <!-- Lock icon overlay -->
  <g transform="translate(256,200)">
    <!-- Lock body -->
    <rect x="-32" y="-8" width="64" height="48" rx="6" fill="#1E3A5F" stroke="#60A5FA" stroke-width="3"/>
    <!-- Lock shackle -->
    <path d="M-18,-8 V-22 C-18,-42 18,-42 18,-22 V-8" fill="none" stroke="#60A5FA" stroke-width="5" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="14" r="6" fill="#60A5FA"/>
    <rect x="-2" y="14" width="4" height="12" rx="2" fill="#60A5FA"/>
  </g>
</svg>
